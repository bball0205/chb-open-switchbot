<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>開啟 SwitchBot</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,sans-serif;
      background:#f6f7f8;color:#111;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:1.5rem;box-sizing:border-box;
    }
    .btn{
      display:block;width:min(100%,420px);
      text-align:center;
      padding:1.6rem 1.4rem;
      border:0;border-radius:18px;
      font-size:1.55rem;font-weight:700;
      background:#222;color:#fff;cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.18);
    }
    #hint{color:#b00;font-size:1rem;margin-top:1.2rem;min-height:1.2em;text-align:center}
  </style>
</head>
<body>
  <button class="btn" type="button" id="closeBtn">關閉視窗</button>
  <p id="hint"></p>
  <script>
    function openScheme(u) {
      try {
        const ifr = document.createElement('iframe');
        ifr.style.display = 'none';
        ifr.src = u;
        document.body.appendChild(ifr);
      } catch (e) {}
      try { window.location.href = u; } catch (e) {}
    }
    function tryClose() {
      const hint = document.getElementById('hint');
      try { window.open('', '_self'); } catch (e) {}
      try { window.close(); } catch (e) {}
      setTimeout(function () {
        if (!window.closed) {
          hint.textContent = '無法自動關閉，請點左上角 ✕';
        }
      }, 200);
    }
    document.getElementById('closeBtn').addEventListener('click', tryClose);
    setTimeout(function () { openScheme('switchbot://'); }, 150);
  </script>
</body>
</html>
